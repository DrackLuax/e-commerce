<h2>
    produto selecionado:
    @if(produtoSelecionado()){
        <strong style="color:green"></strong>
    }@else{
        <span style="color: gray">Nenhum Produto selecionado</span>
    } 

</h2>
@for(item of produtos(); track item){
    <app-produto
    [nome]="item.nome"
    [preco]="item.preco"
    (produtoSelecionado) = "exibirProduto($event)"
    ></app-produto>
}
<hr>
<p><button (click)="adcionarProduto()">Adicionar</button></p>
<p><button (click)="substituirProdutos()">Substituir Produto</button></p>
<hr>
<h2>total de Produtos: {{totalProdutos()}}</h2>
<h3>Valor Total: {{valorTotal()|precoFormatado}}</h3>
<hr>
